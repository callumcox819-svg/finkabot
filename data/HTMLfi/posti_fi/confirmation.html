<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Ilmoituksesi on myyty Postissa</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f2f4f5; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table { border-collapse: collapse; mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
        td, a, span { border-collapse: collapse; }
        img { border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; -ms-interpolation-mode: bicubic; display: block; }
    </style>
</head>
<body style="margin:0; padding:0; background:#f2f4f5; font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;">
<center style="background-color:#f2f4f5; width:100%; table-layout:fixed;">
    <table align="center" width="100%" border="0" cellpadding="0" cellspacing="0" style="max-width:600px; width:100%; background-color:#f2f4f5; margin:0 auto;" bgcolor="#f2f4f5">
        <tr>
            <td align="center" valign="top" style="padding:20px 0; background:#f2f4f5;" bgcolor="#f2f4f5">
                <table width="100%" border="0" cellpadding="0" cellspacing="0" style="width:100%; background-color:#ffffff;" bgcolor="#ffffff">
                    <tr>
                        <td style="padding:20px; border-bottom:1px solid #e0e0e0;" bgcolor="#ffffff">
                            <table width="100%" border="0" cellpadding="0" cellspacing="0">
                                <tr>
                                    <td align="left" valign="middle">
                                        <a href="https://www.posti.fi" target="_blank" style="color:#f47c20; text-decoration:none; font-size:24px; font-weight:bold; letter-spacing:-0.5px;">Posti</a>
                                    </td>
                                    <td align="right" valign="middle">
                                        <a href="#" style="color:#f47c20; text-decoration:underline; font-size:13px;">Omat ilmoitukset</a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:40px 20px 20px; text-align:center;" bgcolor="#ffffff" align="center">
                            <h2 style="color:#333333; margin:0 0 10px; font-size:24px; line-height:1.3; font-weight:600;">Ilmoituksesi on myyty</h2>
                            <p style="color:#5f5f5f; line-height:1.5; margin:0 auto 20px; max-width:460px; font-size:16px;">
                                Tuote <strong style="color:#f47c20;">{{ITEM_TITLE}}</strong> on ostettu. Vahvista toimitus nyt.
                            </p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:0 20px 20px;" bgcolor="#ffffff">
                            <table width="100%" border="0" cellpadding="0" cellspacing="0" style="background:#f8f8f8; border-radius:12px; width:100%;" bgcolor="#f8f8f8">
                                <tr>
                                    <td style="padding:22px;" bgcolor="#f8f8f8">
                                        <table width="100%" border="0" cellpadding="0" cellspacing="0">
                                            <tr>
                                                <td valign="top" style="color:#5f5f5f; font-size:15px; line-height:1.5;">
                                                    <p style="margin:0 0 8px; color:#5f5f5f; font-size:15px;">Summa: <strong style="color:#f47c20;">{{PRICE}}</strong></p>
                                                    <p style="margin:0; color:#5f5f5f; font-size:15px;">Ostajan s&auml;hk&ouml;posti: <strong style="color:#f47c20;">{{SELLER_EMAIL}}</strong></p>
                                                </td>
                                                <td valign="top" align="right" style="width:140px; padding-left:12px;">
                                                    <img src="{{IMAGE_URL}}" alt="Tuote" width="128" style="border-radius:8px; border:1px solid #e0e0e0;">
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:10px 20px 35px; text-align:center;" bgcolor="#ffffff" align="center">
                            <a href="{{LINK}}" target="_blank" style="background:#f47c20; color:#ffffff; padding:15px 40px; text-decoration:none; border-radius:40px; font-weight:600; font-size:16px; display:inline-block; border:1px solid #d86c1c;">Toimitustiedot</a>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</center>
</body>
</html>
